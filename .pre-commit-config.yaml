repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Gitleaks — wykrywanie sekretów (pre-commit)
        args:
          - "--config"
          - "configs/.gitleaks.toml"
          - "--verbose"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # Limit 2 MB — pełnoekranowe zrzuty Retina (PNG, ~700 KB - 1,5 MB)
        # są nieodzowną częścią dokumentacji eksperymentu.
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
