name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  FLASK_APP_DIR: apps/flask-app

jobs:
  # ============================================================
  # ETAP 1 — Skanowanie sekretów (Gitleaks)
  # ============================================================
  secrets-scan:
    name: "Etap 1 — Skanowanie sekretów (Gitleaks)"
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.18.4"
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks (always emit SARIF)
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config configs/.gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 0 \
            --no-color \
            --verbose

      - name: Upload Gitleaks SARIF to Code Scanning
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Archive Gitleaks SARIF as artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results.sarif
          path: gitleaks.sarif
          retention-days: 14

      - name: Fail if leaks detected (gate)
        run: |
          set -euo pipefail
          LEAKS=$(jq '[.runs[]?.results[]?] | length' gitleaks.sarif)
          echo "Gitleaks findings: ${LEAKS}"
          if [ "${LEAKS:-0}" -gt 0 ]; then
            echo "::error::Gitleaks detected ${LEAKS} potential secret(s). See SARIF report and Security tab for details."
            jq -r '.runs[].results[] | "  - \(.ruleId) at \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)"' gitleaks.sarif
            exit 1
          fi

  # ============================================================
  # ETAP 2 — Statyczna analiza kodu (CodeQL)
  # ============================================================
  sast:
    name: "Etap 2 — SAST (CodeQL)"
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Flask app dependencies
        run: pip install -r ${{ env.FLASK_APP_DIR }}/requirements.txt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: ./configs/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ============================================================
  # ETAP 3 — Analiza składu oprogramowania (Trivy + Dep-Check)
  # ============================================================
  sca:
    name: "Etap 3 — SCA (Trivy + Dependency-Check)"
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF — informational, all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.FLASK_APP_DIR }}
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy filesystem scan (gate — CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.FLASK_APP_DIR }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Run OWASP Dependency-Check
        if: always()
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: flask-app
          path: ${{ env.FLASK_APP_DIR }}
          format: SARIF
          out: dc-reports
          args: >-
            --enableExperimental
            --failOnCVSS 9

      - name: Upload Dependency-Check SARIF
        if: always() && hashFiles('dc-reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dc-reports/dependency-check-report.sarif
          category: dependency-check

      - name: Archive raw Dependency-Check reports
        if: always() && hashFiles('dc-reports/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: dc-reports/
          retention-days: 14

  # ============================================================
  # ETAP 4 — Build obrazu + skanowanie IaC (Hadolint + Checkov + Trivy)
  # ============================================================
  build-and-iac:
    name: "Etap 4 — Build + IaC (Hadolint + Checkov + Trivy image)"
    needs: sca
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.FLASK_APP_DIR }}/Dockerfile
          config: configs/.hadolint.yaml
          format: sarif
          output-file: hadolint.sarif
          no-fail: false

      - name: Upload Hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: hadolint.sarif
          category: hadolint

      - name: Build Docker image
        run: docker build -t flask-app:ci ${{ env.FLASK_APP_DIR }}

      - name: Trivy image scan (SARIF — informational, all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: flask-app:ci
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Trivy image scan (gate — CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: flask-app:ci
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Checkov scan
        if: always()
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.FLASK_APP_DIR }}
          framework: dockerfile
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: false

      - name: Locate Checkov SARIF
        if: always()
        id: locate-checkov
        run: |
          set +e
          for candidate in \
            "checkov-results.sarif/results_sarif.sarif" \
            "checkov-results.sarif" \
            "results_sarif.sarif" \
            "results.sarif"; do
            if [ -f "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              echo "Found Checkov SARIF at: $candidate"
              exit 0
            fi
          done
          echo "path=" >> "$GITHUB_OUTPUT"
          echo "No Checkov SARIF file found. Workspace listing:"
          ls -la

      - name: Upload Checkov SARIF
        if: always() && steps.locate-checkov.outputs.path != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.locate-checkov.outputs.path }}
          category: checkov

  # ============================================================
  # ETAP 5 — Dynamiczne testowanie (OWASP ZAP)
  # ============================================================
  dast:
    name: "Etap 5 — DAST (OWASP ZAP na Juice Shop)"
    needs: build-and-iac
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start OWASP Juice Shop
        run: |
          docker compose -f apps/juice-shop/docker-compose.yml up -d
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
              echo "Juice Shop is ready (after ${i} attempts)"
              exit 0
            fi
            echo "Waiting for Juice Shop... (${i}/30)"
            sleep 2
          done
          echo "ERROR: Juice Shop did not become ready in 60 seconds"
          docker compose -f apps/juice-shop/docker-compose.yml logs
          exit 1

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: http://localhost:3000
          rules_file_name: configs/.zap/rules.tsv
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-baseline-report

      - name: Stop Juice Shop
        if: always()
        run: docker compose -f apps/juice-shop/docker-compose.yml down --volumes

  # ============================================================
  # ETAP 6 — Raportowanie zbiorcze
  # ============================================================
  report:
    name: "Etap 6 — Raportowanie zbiorcze"
    needs: [secrets-scan, sast, sca, build-and-iac, dast]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate run summary
        run: |
          {
            echo "## Podsumowanie potoku DevSecOps"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo "**Run ID:** \`${{ github.run_id }}\`"
            echo ""
            echo "| Etap | Narzędzie | Wynik |"
            echo "|------|-----------|-------|"
            echo "| 1 | Gitleaks | ${{ needs.secrets-scan.result }} |"
            echo "| 2 | CodeQL (SAST) | ${{ needs.sast.result }} |"
            echo "| 3 | Trivy + Dependency-Check (SCA) | ${{ needs.sca.result }} |"
            echo "| 4 | Hadolint + Checkov + Trivy (IaC + image) | ${{ needs.build-and-iac.result }} |"
            echo "| 5 | OWASP ZAP (DAST) | ${{ needs.dast.result }} |"
            echo ""
            echo "Wszystkie raporty SARIF są dostępne w zakładce **Security → Code scanning** repozytorium."
          } >> "$GITHUB_STEP_SUMMARY"
